name: Build and publish VSIX artifacts

# Build per-platform .vsix files for every target we support. Triggered
# manually (workflow_dispatch) or by pushing a `v*` tag. On tag pushes
# each matrix job ALSO publishes its .vsix to the VS Code Marketplace
# using the VSCE_PAT secret. Manual workflow_dispatch runs build the
# artifacts but skip publishing — use that path for dry-runs.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  package:
    name: ${{ matrix.target }}
    strategy:
      # Keep going on per-platform failures so a single broken runner
      # doesn't hide success on the others.
      fail-fast: false
      matrix:
        include:
          # macOS — Apple Silicon (M-series). macos-latest is arm64.
          - os: macos-latest
            target: darwin-arm64
          # macOS Intel — packaged on the arm64 runner. node-pty's
          # npm tarball ships both darwin-x64 and darwin-arm64
          # prebuilds, so producing an x64 .vsix needs no Intel
          # hardware; package-platforms.mjs just copies the right
          # prebuild dir into the .vsix. Mirrors Microsoft's
          # vscode-platform-specific-sample, which also runs both
          # darwin targets on macos-latest. macos-13 was abandoned
          # because that Intel runner pool queues for 60+ minutes
          # on the free tier.
          - os: macos-latest
            target: darwin-x64
          # Linux x64 — node-pty has no prebuild for linux, so
          # pnpm install compiles it from source via node-gyp. The
          # build output lands in node_modules/node-pty/build/Release/,
          # NOT in prebuilds/linux-x64/; the "Stage Linux native build"
          # step below moves it into the prebuilds slot that
          # package-platforms.mjs and .vscodeignore expect.
          - os: ubuntu-latest
            target: linux-x64
          # Linux arm64 — same compile-from-source path. Public GitHub-
          # hosted ARM runner; free on public repos.
          - os: ubuntu-24.04-arm
            target: linux-arm64
          # Windows x64 — uses node-pty's bundled win32-x64 prebuild.
          - os: windows-latest
            target: win32-x64
          # Windows ARM — uses bundled win32-arm64 prebuild. Public
          # GitHub-hosted ARM runner; free on public repos.
          - os: windows-11-arm
            target: win32-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        # --frozen-lockfile so CI never silently bumps a dep version.
        # Postinstall runs scripts/fix-pty-perms.mjs which chmod+x's
        # node-pty's spawn-helper — required for the .vsix to install
        # cleanly on macOS (hardened runtime won't posix_spawnp a
        # non-executable file).
        run: pnpm install --frozen-lockfile

      - name: Stage Linux native build into prebuilds dir
        # node-pty's install script runs node-gyp rebuild on Linux (no
        # prebuilt binary in its npm tarball). node-gyp drops pty.node
        # in build/Release/, but .vscodeignore only re-includes
        # node-pty's prebuilds/ subtree and package-platforms.mjs checks
        # that same dir. Copy pty.node into the platform-specific
        # prebuilds slot so both can find it. Note: no spawn-helper on
        # Linux — that's a macOS-only workaround for hardened runtime;
        # Linux node-pty uses plain fork/exec, so the binding.gyp
        # doesn't even build a spawn-helper target on this platform.
        if: runner.os == 'Linux'
        shell: bash
        run: |
          src=node_modules/node-pty/build/Release
          dst=node_modules/node-pty/prebuilds/${{ matrix.target }}
          mkdir -p "$dst"
          cp "$src/pty.node" "$dst/pty.node"
          ls -la "$dst"

      - name: Build VSIX
        shell: bash
        # The script handles stripping other-platform prebuilds + .pdb
        # files. On Linux runners, node-pty was just compiled from
        # source so its prebuilds/linux-{x64,arm64}/ dir is the only
        # native binary present — the script's "move other platforms
        # aside" step still runs but is essentially a no-op there.
        run: node scripts/package-platforms.mjs ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: glance-${{ matrix.target }}
          path: dist/*.vsix
          if-no-files-found: error
          retention-days: 30

      - name: Publish to VS Code Marketplace
        # Only on tag pushes. Manual workflow_dispatch runs stop after
        # the artifact upload so we can dry-run a build without shipping.
        # Each matrix job publishes its own .vsix independently — with
        # fail-fast: false, a single platform failure won't block the
        # others from shipping. Re-run the failed job to fill the gap.
        # "Already published" errors (someone shipped that target+version
        # locally already) are treated as success so the workflow stays
        # idempotent across partial re-runs.
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          for f in dist/*.vsix; do
            echo "Publishing $f"
            if out=$(npx @vscode/vsce publish --packagePath "$f" 2>&1); then
              echo "$out"
            else
              echo "$out"
              if echo "$out" | grep -qiE "(already exists|duplicate version|409)"; then
                echo "→ already published, treating as success"
              else
                exit 1
              fi
            fi
          done
